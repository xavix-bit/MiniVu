name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Tauri app
        run: npm run tauri build -- --bundles app

      - name: Sign and package macOS app
        shell: bash
        run: |
          set -euo pipefail

          app_path="src-tauri/target/release/bundle/macos/MiniVu.app"
          output_dir="src-tauri/target/release/bundle/dmg"
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          architecture="$(uname -m)"
          package_name="MiniVu_${version}_${architecture}"

          test -d "$app_path"
          mkdir -p "$output_dir"

          # CI has no Developer ID certificate. Seal the complete bundle so the
          # downloadable build is internally consistent and can be opened via
          # macOS's explicit Open action.
          codesign --force --deep --sign - --timestamp=none "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

          ditto -c -k --sequesterRsrc --keepParent \
            "$app_path" "$output_dir/${package_name}.app.zip"

          staging_dir="$(mktemp -d)"
          trap 'rm -rf "$staging_dir"' EXIT
          ditto "$app_path" "$staging_dir/MiniVu.app"
          ln -s /Applications "$staging_dir/Applications"
          hdiutil create \
            -volname MiniVu \
            -srcfolder "$staging_dir" \
            -ov \
            -format UDZO \
            "$output_dir/${package_name}.dmg"

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: MiniVu-macos-arm64
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.app.zip
          if-no-files-found: error

  publish:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MiniVu-macos-arm64
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
