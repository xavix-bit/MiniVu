name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY
            unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi
          npm run tauri build

      - name: Verify macOS package
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          app_path="src-tauri/target/release/bundle/macos/MiniVu.app"
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          if [[ -z "$APPLE_SIGNING_IDENTITY" ]]; then
            scripts/package-macos-release.sh "$app_path" "$dmg_path"
          else
            codesign --verify --deep --strict --verbose=2 "$app_path"
            hdiutil verify "$dmg_path"
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MiniVu-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MiniVu-macos-dmg
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          name: MiniVu ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
